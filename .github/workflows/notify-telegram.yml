name: Notify Telegram on commit

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compose and send Telegram message
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -e

          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%h)
          DATE=$(date -u +%Y-%m-%d)
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          # Skip workflow's own commits to avoid loops
          if [[ "${COMMIT_MSG}" == ci:* ]]; then
            echo "Skipping CI commit"
            exit 0
          fi

          # Find today's idea file if it exists
          MEMO_FILE=""
          if [ -f "ideas/${DATE}.md" ]; then
            MEMO_FILE="ideas/${DATE}.md"
            MEMO_URL="${REPO_URL}/blob/main/${MEMO_FILE}"
            ICON="💡"
            HEADER="${DATE} — new idea memo committed"
            BODY="${COMMIT_MSG}

          Memo: ${MEMO_URL}"
          else
            ICON="📝"
            HEADER="${DATE} — repo update"
            BODY="${COMMIT_MSG}

          Commit: ${REPO_URL}/commit/${COMMIT_SHA}"
          fi

          MSG="${ICON} ${HEADER}

          ${BODY}"

          curl -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "disable_web_page_preview=false" \
            --data-urlencode "text=${MSG}"
